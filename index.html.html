<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aji Ntssam7o 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Dancing+Script:wght@700&family=Raleway:wght@200;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --rose: #e8547a;
  --deep: #0d0510;
  --mid: #1a0d22;
  --lavender: #b07fd4;
  --blush: #fbb6ce;
  --gold: #f6c90e;
  --text: #f3e8ff;
}

html, body {
  width:100%; height:100%;
  background: var(--deep);
  font-family: 'Raleway', sans-serif;
  color: var(--text);
  overflow-x: hidden;
}

/* ── CANVAS BG ── */
canvas#bg {
  position:fixed; inset:0; z-index:0;
  pointer-events:none;
}

/* ── SCREEN: INTRO ── */
#screen-intro {
  position:fixed; inset:0; z-index:20;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap: 2.5rem;
  padding: 2rem;
  transition: opacity 0.8s ease;
}

.intro-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(1.1rem, 5vw, 1.4rem);
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  text-align:center;
  animation: fadeIn 2s ease both;
}

.intro-name {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(3rem, 14vw, 5.5rem);
  background: linear-gradient(135deg, var(--blush) 0%, var(--lavender) 50%, var(--rose) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align:center;
  line-height:1;
  filter: drop-shadow(0 0 30px rgba(232,84,122,0.4));
  animation: fadeIn 2s ease 0.3s both;
}

/* Big glow button */
.btn-enter {
  position: relative;
  padding: 1.1rem 3rem;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: white;
  background: transparent;
  border: 1.5px solid rgba(232,84,122,0.6);
  border-radius: 60px;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.3s, transform 0.2s;
  animation: fadeIn 2s ease 0.7s both;
}
.btn-enter::before {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(232,84,122,0.15), rgba(176,127,212,0.15));
  opacity:0;
  transition: opacity 0.3s;
}
.btn-enter:hover::before { opacity:1; }
.btn-enter:hover { border-color: var(--rose); transform: scale(1.04); }
.btn-enter:active { transform: scale(0.97); }

/* Pulse ring */
.btn-enter::after {
  content:'';
  position:absolute; inset:-8px;
  border-radius:60px;
  border: 1px solid rgba(232,84,122,0.3);
  animation: ringPulse 2s ease-in-out infinite;
}
@keyframes ringPulse {
  0%,100% { transform:scale(1); opacity:0.4; }
  50% { transform:scale(1.06); opacity:0; }
}

.intro-sub {
  font-size: 0.75rem;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.2);
  text-align:center;
  animation: fadeIn 2s ease 1.1s both;
}

/* ── SCREEN: PLAYER ── */
#screen-player {
  position:fixed; inset:0; z-index:15;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap: 2rem;
  padding: 2rem 1.5rem;
  opacity:0; pointer-events:none;
  transition: opacity 1s ease 0.3s;
}
#screen-player.visible {
  opacity:1; pointer-events:all;
}

/* Vinyl */
.vinyl-wrap {
  position:relative;
  width:160px; height:160px;
  flex-shrink:0;
}
.vinyl {
  width:160px; height:160px;
  border-radius:50%;
  background: conic-gradient(
    #1a0d22 0deg, #2d1040 40deg, #1a0d22 80deg,
    #2d1040 120deg, #1a0d22 160deg, #2d1040 200deg,
    #1a0d22 240deg, #2d1040 280deg, #1a0d22 320deg, #2d1040 360deg
  );
  box-shadow: 0 0 0 2px rgba(255,255,255,0.05),
              0 0 40px rgba(232,84,122,0.3),
              0 0 80px rgba(176,127,212,0.15);
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.vinyl.spinning { animation: vinylSpin 4s linear infinite; }
@keyframes vinylSpin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.vinyl-center {
  width:44px; height:44px;
  border-radius:50%;
  background: radial-gradient(circle, var(--rose) 0%, var(--mid) 100%);
  border: 2px solid rgba(255,255,255,0.1);
  position:absolute;
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem;
}
.vinyl-groove {
  position:absolute; inset:0; border-radius:50%;
  background: repeating-radial-gradient(circle,
    transparent 0px, transparent 8px,
    rgba(255,255,255,0.03) 9px, transparent 10px
  );
}

/* Song info */
.song-info { text-align:center; }
.song-name {
  font-family:'Dancing Script', cursive;
  font-size: clamp(1.6rem, 6vw, 2.2rem);
  color: var(--blush);
  margin-bottom:0.3rem;
}
.song-hint {
  font-size:0.7rem; letter-spacing:3px;
  color:rgba(255,255,255,0.25); text-transform:uppercase;
}

/* Progress */
.progress-outer {
  width:100%; max-width:360px;
}
.progress-track {
  width:100%; height:3px;
  background: rgba(255,255,255,0.08);
  border-radius:2px; overflow:hidden;
}
.progress-fill {
  height:100%; width:0%;
  background: linear-gradient(90deg, var(--rose), var(--lavender));
  transition: width 0.3s linear;
  border-radius:2px;
}
.time-row {
  display:flex; justify-content:space-between;
  font-size:0.65rem; color:rgba(255,255,255,0.25);
  margin-top:0.4rem;
}

/* Lyrics */
.lyrics-box {
  width:100%; max-width:400px;
  text-align:center;
  min-height:140px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:0.4rem;
  padding: 0 1rem;
}
.lyric {
  font-family:'Cormorant Garamond', serif;
  font-size: clamp(1rem, 4vw, 1.2rem);
  font-weight:300;
  color:rgba(255,255,255,0.2);
  transition: all 0.5s ease;
  line-height:1.5;
}
.lyric.active {
  color:white;
  font-size: clamp(1.15rem, 4.5vw, 1.4rem);
  font-weight:600;
  font-style:italic;
  text-shadow: 0 0 25px rgba(232,84,122,0.9), 0 0 50px rgba(176,127,212,0.4);
}
.lyric.passed { color:rgba(255,255,255,0.1); }

/* Message bas */
.msg {
  font-family:'Dancing Script', cursive;
  font-size: clamp(1rem, 4vw, 1.2rem);
  color:rgba(251,182,206,0.7);
  text-align:center;
  padding:0 1rem;
}

/* ── FLOATING HEARTS ── */
.fheart {
  position:fixed; z-index:50;
  pointer-events:none;
  animation: fheartUp 2.5s ease-out forwards;
  font-size:1.4rem;
}
@keyframes fheartUp {
  0%  { opacity:1; transform:translateY(0) scale(1) rotate(0deg); }
  100%{ opacity:0; transform:translateY(-200px) scale(0.4) rotate(20deg); }
}

/* ── UTILS ── */
@keyframes fadeIn {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* hidden yt */
#yt { display:none; position:absolute; width:1px; height:1px; }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="yt"></div>

<!-- INTRO SCREEN -->
<div id="screen-intro">
  <p class="intro-title">Un message pour toi 💌</p>
  <h1 class="intro-name">Aji Ntssam7o</h1>
  <button class="btn-enter" onclick="enterSite()">✦ Dkhol ✦</button>
  <p class="intro-sub">click bach tsm3i lmusic</p>
</div>

<!-- PLAYER SCREEN -->
<div id="screen-player">
  <div class="vinyl-wrap">
    <div class="vinyl" id="vinyl">
      <div class="vinyl-groove"></div>
      <div class="vinyl-center">🎵</div>
    </div>
  </div>

  <div class="song-info">
    <div class="song-name">Menek Majani Noum</div>
    <div class="song-hint">aji 3ndi ntssamho 🥺</div>
  </div>

  <div class="progress-outer">
    <div class="progress-track">
      <div class="progress-fill" id="prog"></div>
    </div>
    <div class="time-row">
      <span id="tCur">0:56</span>
      <span>1:15</span>
    </div>
  </div>

  <div class="lyrics-box" id="lyricsBox"></div>

  <p class="msg">"Bghitkترجعي… 🌹"</p>
</div>

<script>
// ── CANVAS PARTICLES ──
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function initParticles() {
  particles = [];
  for (let i=0; i<80; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.5+0.3,
      op: Math.random()*0.6+0.1,
      vx: (Math.random()-0.5)*0.2,
      vy: (Math.random()-0.5)*0.2,
      pulse: Math.random()*Math.PI*2,
      pspeed: 0.01+Math.random()*0.02
    });
  }
}
initParticles();

// Occasional petal emojis
const petals = [];
const PEMOJIS = ['🌸','🌹','💕','✨','🌺','💗'];
function spawnPetal() {
  petals.push({
    x: Math.random()*W, y:-30,
    em: PEMOJIS[Math.floor(Math.random()*PEMOJIS.length)],
    speed: 1+Math.random()*1.5,
    rot: Math.random()*360,
    rspeed: (Math.random()-0.5)*2,
    opacity: 0.6+Math.random()*0.4,
    size: 14+Math.random()*10
  });
}
setInterval(spawnPetal, 1200);

function drawBg() {
  ctx.clearRect(0,0,W,H);
  // gradient bg
  const grd = ctx.createRadialGradient(W*0.4, H*0.4, 0, W*0.5, H*0.5, Math.max(W,H)*0.8);
  grd.addColorStop(0,'#1a0a2e');
  grd.addColorStop(0.5,'#0d0510');
  grd.addColorStop(1,'#000000');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);

  // stars
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.pulse += p.pspeed;
    if(p.x<0) p.x=W; if(p.x>W) p.x=0;
    if(p.y<0) p.y=H; if(p.y>H) p.y=0;
    const o = p.op * (0.6 + 0.4*Math.sin(p.pulse));
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${o})`;
    ctx.fill();
  });

  // petals
  ctx.save();
  for(let i=petals.length-1; i>=0; i--) {
    const p = petals[i];
    p.y += p.speed; p.rot += p.rspeed;
    ctx.globalAlpha = p.opacity * (1 - p.y/H);
    ctx.font = `${p.size}px serif`;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI/180);
    ctx.fillText(p.em, -p.size/2, p.size/2);
    ctx.restore();
    if(p.y > H+40) petals.splice(i,1);
  }
  ctx.restore();
  ctx.globalAlpha = 1;

  requestAnimationFrame(drawBg);
}
drawBg();

// ── LYRICS DATA (relative seconds from 0:56) ──
const LYRICS = [
  { t:0,  text:"♪ Menek majani noum ♪" },
  { t:3,  text:"Waynma mchit kayn souwek" },
  { t:6,  text:"F koll 7aja bghit nchufek" },
  { t:9,  text:"Aji 3ndi ntssamho 🥺" },
  { t:12, text:"Ghir nta li 3raft tsam7ni" },
  { t:15, text:"Ma bghitch nbqa be3dak" },
  { t:18, text:"♪ Aji ntssam7o ♪" },
];

const START = 56;
const END   = 75;
const TOTAL = END - START; // 19s

// Build lyric elements
const lbox = document.getElementById('lyricsBox');
LYRICS.forEach((l, i) => {
  const el = document.createElement('div');
  el.className = 'lyric';
  el.id = 'l'+i;
  el.textContent = l.text;
  lbox.appendChild(el);
});

// ── YOUTUBE ──
let player, ytReady = false;
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady = () => {
  const div = document.getElementById('yt');
  const inner = document.createElement('div');
  inner.id = 'ytframe';
  div.appendChild(inner);
  player = new YT.Player('ytframe', {
    width:'1', height:'1',
    videoId:'iaa4aN3jSLA',
    playerVars:{ autoplay:0, controls:0, playsinline:1, start:START },
    events:{
      onReady: () => { ytReady = true; },
      onStateChange: e => {
        if(e.data === YT.PlayerState.PLAYING) {
          document.getElementById('vinyl').classList.add('spinning');
          trackProgress();
        }
      }
    }
  });
};

// ── ENTER SITE ──
function enterSite() {
  // Fade out intro
  const intro = document.getElementById('screen-intro');
  intro.style.opacity = '0';
  intro.style.pointerEvents = 'none';

  // Show player
  setTimeout(() => {
    document.getElementById('screen-player').classList.add('visible');
    intro.style.display = 'none';

    // Spawn hearts burst
    for(let i=0; i<8; i++) setTimeout(()=>spawnHeart(), i*150);

    // Play music
    if(ytReady && player) {
      player.seekTo(START);
      player.playVideo();
    } else {
      // fallback: wait for player
      const wait = setInterval(() => {
        if(ytReady && player) {
          clearInterval(wait);
          player.seekTo(START);
          player.playVideo();
        }
      }, 200);
    }

    // Stop at END
    setTimeout(() => {
      if(player && player.pauseVideo) player.pauseVideo();
      document.getElementById('vinyl').classList.remove('spinning');
      document.getElementById('prog').style.width = '100%';
    }, TOTAL * 1000);

  }, 500);
}

// ── PROGRESS + LYRICS ──
let progInterval;
function trackProgress() {
  clearInterval(progInterval);
  const t0 = Date.now();
  progInterval = setInterval(() => {
    const elapsed = (Date.now()-t0)/1000;
    if(elapsed >= TOTAL) { clearInterval(progInterval); return; }

    // progress bar
    document.getElementById('prog').style.width = (elapsed/TOTAL*100)+'%';

    // time
    const s = Math.floor(START+elapsed);
    document.getElementById('tCur').textContent =
      Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;

    // lyrics highlight
    LYRICS.forEach((l,i) => {
      const el = document.getElementById('l'+i);
      const next = LYRICS[i+1]?.t ?? 99;
      el.classList.remove('active','passed');
      if(elapsed >= l.t && elapsed < next) el.classList.add('active');
      else if(elapsed >= next) el.classList.add('passed');
    });
  }, 150);
}

// ── FLOATING HEARTS ──
function spawnHeart() {
  const h = document.createElement('div');
  h.className='fheart';
  h.textContent = ['💕','💗','💖','🌹','✨','🥺'][Math.floor(Math.random()*6)];
  h.style.cssText = `left:${10+Math.random()*80}%;bottom:${5+Math.random()*30}%`;
  document.body.appendChild(h);
  setTimeout(()=>h.remove(), 2600);
}
</script>
</body>
</html>
